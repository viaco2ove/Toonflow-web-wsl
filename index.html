<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toonflow</title>
    <style id="video-canvas-hotfix">
      .gridContainer.videoMode {
        width: 420px !important;
        background: #fff !important;
        border: 1px solid #eadcff !important;
        border-radius: 16px !important;
        overflow: hidden !important;
        box-shadow: 0 8px 24px rgba(124, 58, 237, 0.14) !important;
      }
      .gridContainer.videoMode .topMenu {
        display: block !important;
        padding: 12px 14px 10px !important;
        background: #fff !important;
        border-bottom: 1px solid #f1eaff !important;
      }
      .gridContainer.videoMode .topMenu .gridTitle {
        font-size: 15px !important;
        font-weight: 700 !important;
        color: #4c1d95 !important;
        margin-bottom: 6px !important;
      }
      .gridContainer.videoMode .topMenu .fragmentContent {
        font-size: 13px !important;
        color: #64748b !important;
        margin-bottom: 8px !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
      }
      .gridContainer.videoMode .grid {
        display: block !important;
        grid-template-columns: none !important;
        grid-template-rows: none !important;
      }
      .gridContainer.videoMode .grid .gridItem:not(:first-child) {
        display: none !important;
      }
      .gridContainer.videoMode .gridItem {
        width: 100% !important;
        min-height: 180px !important;
        background: #f8f6ff !important;
        border: none !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        flex-direction: column !important;
        position: relative !important;
      }
      .gridContainer.videoMode .gridItem::before {
        content: "⚙";
        width: 72px;
        height: 72px;
        border-radius: 999px;
        background: #eadcff;
        color: #7c3aed;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        margin-bottom: 14px;
      }
      .gridContainer.videoMode .gridItem::after {
        content: "待生成\A点击进入生成";
        white-space: pre;
        color: #94a3b8;
        text-align: center;
        font-size: 16px;
        line-height: 1.45;
      }
      .gridContainer.videoMode .gridItem img,
      .gridContainer.videoMode .gridItem .preview,
      .gridContainer.videoMode .gridItem .cellPrompt,
      .gridContainer.videoMode .gridItem .cellText {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script id="chat-history-manager-entry">
      (function () {
        if (window.__chatHistoryManagerInjected__) return;
        window.__chatHistoryManagerInjected__ = true;

        const styleId = "chat-history-manager-style";
        if (!document.getElementById(styleId)) {
          const style = document.createElement("style");
          style.id = styleId;
          style.textContent = `
            .chm-mask{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:99992;display:none;align-items:center;justify-content:center}
            .chm-mask.open{display:flex}
            .chm-panel{width:min(1080px,92vw);height:min(78vh,760px);background:#fff;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(2,6,23,.3)}
            .chm-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #eceff5}
            .chm-title{font-size:18px;font-weight:700;color:#111827}
            .chm-close{border:none;background:transparent;font-size:22px;cursor:pointer;color:#64748b}
            .chm-toolbar{display:flex;gap:8px;align-items:center;padding:10px 16px;border-bottom:1px solid #f0f2f8;flex-wrap:wrap}
            .chm-toolbar input{height:34px;border:1px solid #d8deea;border-radius:8px;padding:0 10px;min-width:220px}
            .chm-btn{height:34px;border-radius:8px;border:1px solid #d8deea;background:#fff;padding:0 12px;cursor:pointer;color:#334155}
            .chm-btn.primary{border:none;background:#7c3aed;color:#fff}
            .chm-btn.danger{border:none;background:#ef4444;color:#fff}
            .chm-body{flex:1;display:flex;min-height:0}
            .chm-list{width:360px;border-right:1px solid #eef2f8;display:flex;flex-direction:column;min-width:300px}
            .chm-list-box{flex:1;overflow:auto;padding:8px}
            .chm-item{border:1px solid #e7ebf3;border-radius:10px;padding:8px 10px;margin-bottom:8px;cursor:pointer}
            .chm-item.active{border-color:#7c3aed;box-shadow:0 0 0 2px rgba(124,58,237,.12)}
            .chm-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
            .chm-item-title{font-size:13px;font-weight:700;color:#111827;line-height:1.35}
            .chm-item-meta{font-size:12px;color:#64748b;margin-top:4px}
            .chm-item-preview{font-size:12px;color:#475569;margin-top:6px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
            .chm-detail{flex:1;display:flex;flex-direction:column;min-width:0}
            .chm-detail-h{padding:10px 14px;border-bottom:1px solid #eef2f8}
            .chm-detail-title{font-size:15px;font-weight:700;color:#0f172a}
            .chm-detail-meta{font-size:12px;color:#64748b;margin-top:3px}
            .chm-msgs{flex:1;overflow:auto;padding:12px}
            .chm-msg{padding:8px 10px;border-radius:8px;border:1px solid #e7ebf3;margin-bottom:8px;background:#fff}
            .chm-msg-role{font-size:12px;font-weight:700;color:#7c3aed;margin-bottom:4px}
            .chm-msg-content{font-size:13px;line-height:1.45;color:#1f2937;white-space:pre-wrap;word-break:break-word}
            .chm-empty{padding:28px 12px;text-align:center;color:#94a3b8}
          `;
          document.head.appendChild(style);
        }

        const state = {
          list: [],
          detail: null,
          selected: new Set(),
          currentId: 0,
          keyword: "",
          loading: false,
        };

        const els = {
          mask: null,
          listBox: null,
          detailBox: null,
          keywordInput: null,
          countLabel: null,
          selectedLabel: null,
        };

        function getBaseUrl() {
          try {
            const fromQuery = new URLSearchParams(location.search).get("baseUrl");
            return fromQuery || "http://localhost:60000";
          } catch (err) {
            return "http://localhost:60000";
          }
        }

        function getHeaders() {
          const rawToken = (localStorage.getItem("token") || "").trim();
          const token = rawToken.replace(/^Bearer\s+/i, "");
          const headers = { "Content-Type": "application/json" };
          if (token) {
            headers.Authorization = `Bearer ${token}`;
          }
          return headers;
        }

        async function postApi(path, body) {
          const res = await fetch(`${getBaseUrl()}${path}`, {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify(body || {}),
          });
          const text = await res.text();
          let json = {};
          try {
            json = JSON.parse(text || "{}");
          } catch (err) {
            throw new Error("接口返回非 JSON");
          }
          if (!res.ok || Number(json.code || 0) !== 200) {
            throw new Error(json.message || `请求失败(${res.status})`);
          }
          return json.data || {};
        }

        function formatTime(value) {
          const n = Number(value);
          if (!Number.isFinite(n) || n <= 0) return "-";
          const ms = n > 1000000000000 ? n : n * 1000;
          try {
            return new Date(ms).toLocaleString("zh-CN", { hour12: false });
          } catch (err) {
            return String(value);
          }
        }

        function safeText(value) {
          return String(value == null ? "" : value);
        }

        function toast(msg) {
          if (window.message && typeof window.message.error === "function") {
            window.message.error(msg);
            return;
          }
          alert(msg);
        }

        function createModal() {
          if (document.getElementById("chat-history-modal-root")) return;
          const mask = document.createElement("div");
          mask.id = "chat-history-modal-root";
          mask.className = "chm-mask";
          mask.innerHTML = `
            <div class="chm-panel">
              <div class="chm-head">
                <div class="chm-title">会话历史管理</div>
                <button class="chm-close" type="button">×</button>
              </div>
              <div class="chm-toolbar">
                <input id="chm-keyword" placeholder="按项目名/会话名/预览搜索" />
                <button id="chm-search" class="chm-btn primary" type="button">搜索</button>
                <button id="chm-refresh" class="chm-btn" type="button">刷新</button>
                <button id="chm-select-all" class="chm-btn" type="button">全选</button>
                <button id="chm-clear-select" class="chm-btn" type="button">取消全选</button>
                <button id="chm-delete-selected" class="chm-btn danger" type="button">删除选中</button>
                <button id="chm-delete-all" class="chm-btn danger" type="button">清空全部</button>
                <span id="chm-count" style="font-size:12px;color:#64748b"></span>
                <span id="chm-selected" style="font-size:12px;color:#7c3aed"></span>
              </div>
              <div class="chm-body">
                <div class="chm-list">
                  <div id="chm-list-box" class="chm-list-box"></div>
                </div>
                <div class="chm-detail">
                  <div id="chm-detail-head" class="chm-detail-h"></div>
                  <div id="chm-detail-box" class="chm-msgs"></div>
                </div>
              </div>
            </div>
          `;
          document.body.appendChild(mask);
          els.mask = mask;
          els.listBox = mask.querySelector("#chm-list-box");
          els.detailBox = mask.querySelector("#chm-detail-box");
          els.keywordInput = mask.querySelector("#chm-keyword");
          els.countLabel = mask.querySelector("#chm-count");
          els.selectedLabel = mask.querySelector("#chm-selected");

          mask.querySelector(".chm-close").addEventListener("click", closeModal);
          mask.addEventListener("click", (event) => {
            if (event.target === mask) closeModal();
          });
          mask.querySelector("#chm-search").addEventListener("click", () => {
            state.keyword = safeText(els.keywordInput.value).trim();
            loadList();
          });
          mask.querySelector("#chm-refresh").addEventListener("click", loadList);
          mask.querySelector("#chm-select-all").addEventListener("click", () => {
            state.selected = new Set(state.list.map((x) => Number(x.id)));
            renderList();
          });
          mask.querySelector("#chm-clear-select").addEventListener("click", () => {
            state.selected.clear();
            renderList();
          });
          mask.querySelector("#chm-delete-selected").addEventListener("click", deleteSelected);
          mask.querySelector("#chm-delete-all").addEventListener("click", deleteAll);
        }

        function renderList() {
          if (!els.listBox) return;
          els.countLabel.textContent = `共 ${state.list.length} 条`;
          els.selectedLabel.textContent = `已选 ${state.selected.size} 条`;
          if (state.loading) {
            els.listBox.innerHTML = `<div class="chm-empty">加载中...</div>`;
            return;
          }
          if (!state.list.length) {
            els.listBox.innerHTML = `<div class="chm-empty">暂无会话记录</div>`;
            renderDetail();
            return;
          }

          const frag = document.createDocumentFragment();
          state.list.forEach((item) => {
            const id = Number(item.id);
            const card = document.createElement("div");
            card.className = `chm-item ${state.currentId === id ? "active" : ""}`;
            const checked = state.selected.has(id) ? "checked" : "";
            card.innerHTML = `
              <div class="chm-row">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                  <input data-action="select" data-id="${id}" type="checkbox" ${checked}/>
                  <span class="chm-item-title">${safeText(item.displayTitle || item.title || "未命名会话")}</span>
                </label>
                <button class="chm-btn danger" data-action="delete" data-id="${id}" type="button" style="height:28px;padding:0 8px">删</button>
              </div>
              <div class="chm-item-meta">${safeText(item.usage || "-")} | ${safeText(item.projectName || "-")} | ${safeText(item.scriptName || "-")} | ${formatTime(item.updatedAt)}</div>
              <div class="chm-item-preview">${safeText(item.preview || "")}</div>
            `;
            card.addEventListener("click", () => {
              state.currentId = id;
              loadDetail(id);
            });
            const checkbox = card.querySelector('input[data-action="select"]');
            checkbox.addEventListener("click", (event) => {
              event.stopPropagation();
              if (checkbox.checked) state.selected.add(id);
              else state.selected.delete(id);
              renderList();
            });
            card.querySelector('button[data-action="delete"]').addEventListener("click", (event) => {
              event.stopPropagation();
              deleteByIds([id]);
            });
            frag.appendChild(card);
          });
          els.listBox.innerHTML = "";
          els.listBox.appendChild(frag);
        }

        function renderDetail() {
          const head = document.getElementById("chm-detail-head");
          if (!head || !els.detailBox) return;
          const detail = state.detail;
          if (!detail) {
            head.innerHTML = `<div class="chm-detail-title">请选择一条会话</div>`;
            els.detailBox.innerHTML = `<div class="chm-empty">右侧显示会话内容</div>`;
            return;
          }
          head.innerHTML = `
            <div class="chm-detail-title">${safeText(detail.displayTitle || detail.title || "会话详情")}</div>
            <div class="chm-detail-meta">${safeText(detail.usage || "-")} | ${safeText(detail.projectName || "-")} | ${safeText(detail.scriptName || "-")} | 共 ${Number(detail.messageCount || 0)} 条</div>
          `;
          const list = Array.isArray(detail.messageList) ? detail.messageList : [];
          if (!list.length) {
            els.detailBox.innerHTML = `<div class="chm-empty">该会话暂无消息</div>`;
            return;
          }
          const frag = document.createDocumentFragment();
          list.forEach((msg) => {
            const block = document.createElement("div");
            block.className = "chm-msg";
            block.innerHTML = `
              <div class="chm-msg-role">${safeText(msg.role || "unknown")}</div>
              <div class="chm-msg-content">${safeText(msg.content || "")}</div>
            `;
            frag.appendChild(block);
          });
          els.detailBox.innerHTML = "";
          els.detailBox.appendChild(frag);
        }

        async function loadList() {
          try {
            state.loading = true;
            renderList();
            const data = await postApi("/setting/getChatHistoryList", {
              keyword: state.keyword,
              page: 1,
              pageSize: 200,
            });
            state.list = Array.isArray(data.list) ? data.list : [];
            const idSet = new Set(state.list.map((x) => Number(x.id)));
            state.selected = new Set(Array.from(state.selected).filter((id) => idSet.has(id)));
            if (!state.currentId || !idSet.has(state.currentId)) {
              state.currentId = state.list.length ? Number(state.list[0].id) : 0;
            }
            state.detail = null;
            state.loading = false;
            renderList();
            if (state.currentId) {
              loadDetail(state.currentId);
            } else {
              renderDetail();
            }
          } catch (err) {
            state.loading = false;
            renderList();
            toast(err && err.message ? err.message : "加载会话列表失败");
          }
        }

        async function loadDetail(id) {
          try {
            const data = await postApi("/setting/getChatHistoryDetail", { id: Number(id) });
            state.detail = data;
            renderList();
            renderDetail();
          } catch (err) {
            toast(err && err.message ? err.message : "加载会话详情失败");
          }
        }

        async function deleteByIds(ids) {
          if (!ids.length) return;
          if (!confirm(`确认删除 ${ids.length} 条会话记录？`)) return;
          try {
            await postApi("/setting/deleteChatHistory", { ids });
            ids.forEach((id) => state.selected.delete(Number(id)));
            if (ids.includes(state.currentId)) {
              state.currentId = 0;
              state.detail = null;
            }
            await loadList();
          } catch (err) {
            toast(err && err.message ? err.message : "删除失败");
          }
        }

        function deleteSelected() {
          const ids = Array.from(state.selected).map((id) => Number(id)).filter((id) => Number.isFinite(id));
          deleteByIds(ids);
        }

        async function deleteAll() {
          if (!confirm("确认清空当前用户全部会话记录？")) return;
          try {
            await postApi("/setting/deleteChatHistory", { all: true });
            state.selected.clear();
            state.currentId = 0;
            state.detail = null;
            await loadList();
          } catch (err) {
            toast(err && err.message ? err.message : "清空失败");
          }
        }

        function openModal() {
          createModal();
          els.mask.classList.add("open");
          loadList();
        }

        function closeModal() {
          if (els.mask) els.mask.classList.remove("open");
        }

        function replaceTextNode(root, from, to) {
          const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
          let node = walker.nextNode();
          while (node) {
            const text = node.nodeValue || "";
            if (text.trim() === from) {
              node.nodeValue = text.replace(from, to);
            }
            node = walker.nextNode();
          }
        }

        function findSidebarButtonByLabel(text) {
          const target = safeText(text).replace(/\s+/g, "");
          const selectors = ['.sidebarNav .sidebarBtn', '.sidebarFooter .sidebarBtn', '[role="menuitem"]', ".t-menu__item", ".t-menu-item", "button"];
          const nodes = Array.from(document.querySelectorAll(selectors.join(",")));
          const candidates = nodes
            .filter((el) => {
              const raw = safeText(el.textContent).trim();
              if (!raw) return false;
              const normalized = raw.replace(/\s+/g, "");
              if (normalized !== target && !normalized.includes(target)) return false;
              const rect = el.getBoundingClientRect();
              return rect.left < 320 && rect.top > 20 && rect.top < window.innerHeight - 20 && rect.width > 36 && rect.height > 20;
            })
            .sort((a, b) => a.getBoundingClientRect().top - b.getBoundingClientRect().top);
          return candidates[0] || null;
        }

        function findSidebarLabel(text) {
          const target = safeText(text).replace(/\s+/g, "");
          const candidates = Array.from(document.querySelectorAll("*")).filter((el) => {
            const raw = safeText(el.textContent).trim();
            if (!raw) return false;
            const normalized = raw.replace(/\s+/g, "");
            return normalized === target;
          });
          return candidates.find((el) => {
            const rect = el.getBoundingClientRect();
            return rect.left < 260 && rect.width > 24 && rect.width < 260 && rect.height < 90 && rect.top > 20;
          }) || null;
        }

        function findSidebarRowByLabel(text) {
          const label = findSidebarLabel(text);
          if (!label) return null;
          let node = label;
          while (node && node !== document.body) {
            const rect = node.getBoundingClientRect();
            if (rect.left < 260 && rect.width >= 120 && rect.width <= 360 && rect.height >= 24 && rect.height <= 120) {
              return node;
            }
            node = node.parentElement;
          }
          return label.closest("div");
        }

        function findTopSidebarMenuRow() {
          const selectors = ['.sidebarNav .sidebarBtn', '[role="menuitem"]', ".t-menu__item", ".t-menu-item"];
          const nodes = Array.from(document.querySelectorAll(selectors.join(",")));
          const candidates = nodes
            .filter((el) => {
              const rect = el.getBoundingClientRect();
              return rect.left < 260 && rect.top > 20 && rect.top < window.innerHeight * 0.65 && rect.width > 36 && rect.height > 20;
            })
            .sort((a, b) => a.getBoundingClientRect().top - b.getBoundingClientRect().top);
          return candidates[0] || null;
        }

        function bindEntryClick(entry) {
          if (entry.dataset.boundClick === "1") return;
          entry.dataset.boundClick = "1";
          entry.addEventListener(
            "click",
            (event) => {
              event.preventDefault();
              event.stopPropagation();
              openModal();
            },
            true,
          );
        }

        function injectSidebarEntry() {
          const projectRow = findSidebarButtonByLabel("我的项目") || findSidebarRowByLabel("我的项目");
          const topMenuRow = findTopSidebarMenuRow();
          const settingRow = findSidebarButtonByLabel("设置") || findSidebarRowByLabel("设置");
          const anchorRow = projectRow || topMenuRow || settingRow;
          if (!anchorRow || !anchorRow.parentNode) return;

          const oldEntry = document.getElementById("chat-history-side-entry");
          if (oldEntry && oldEntry.parentNode === anchorRow.parentNode && oldEntry.previousSibling === anchorRow) {
            bindEntryClick(oldEntry);
            return;
          }
          if (oldEntry && oldEntry.parentNode) oldEntry.parentNode.removeChild(oldEntry);

          const entry = anchorRow.cloneNode(true);
          entry.id = "chat-history-side-entry";
          replaceTextNode(entry, "我的项目", "会话记录");
          replaceTextNode(entry, "设置", "会话记录");
          if (!safeText(entry.textContent).includes("会话记录")) {
            const firstText = entry.querySelector("span");
            if (firstText) firstText.textContent = "会话记录";
          }
          bindEntryClick(entry);

          const parent = anchorRow.parentNode;
          const expectedNext = anchorRow.nextSibling;
          parent.insertBefore(entry, expectedNext);
        }

        function mountEntry() {
          injectSidebarEntry();
        }

        let mountedOnce = false;
        let tryCount = 0;
        const timer = window.setInterval(() => {
          try {
            mountEntry();
            mountedOnce = Boolean(document.getElementById("chat-history-side-entry"));
            tryCount += 1;
            if (mountedOnce || tryCount >= 20) {
              window.clearInterval(timer);
            }
          } catch (err) {
            window.clearInterval(timer);
            console.error("[chat-history-manager] mount failed:", err);
          }
        }, 500);

        window.addEventListener("keydown", (event) => {
          if (event.key === "Escape") closeModal();
        });
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
